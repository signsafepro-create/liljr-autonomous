<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0a0a0f">
<title>LilJR Live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#0a0a0f;color:#fff;min-height:100vh;padding:8px;font-size:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.card{background:#1a1a2e;border-radius:8px;padding:8px;border:1px solid #2a2a3e}
.card.full{grid-column:1/-1}
.title{color:#888;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.value{font-size:16px;font-weight:bold;color:#fff}
.value.green{color:#00ff88}
.value.red{color:#ff4444}
.value.blue{color:#00d4ff}
.value.yellow{color:#ffcc00}
.btn{background:#2a2a3e;border:none;color:#fff;padding:6px 10px;border-radius:6px;font-size:11px;cursor:pointer;margin:2px}
.btn:active{background:#3a3a5e}
.btn.green{background:#004d1a}
.btn.red{background:#4d0000}
.btn.blue{background:#001a4d}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.status-dot.on{background:#00ff88}
.status-dot.off{background:#ff4444}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:.5}100%{opacity:1}}
.log{font-size:9px;color:#666;max-height:60px;overflow-y:auto;margin-top:4px;font-family:monospace}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.brand{font-size:14px;font-weight:bold;color:#00d4ff}
.uptime{font-size:10px;color:#888}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:4px}
.photo-thumb{background:#2a2a3e;height:50px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#888}
</style>
</head>
<body>
<div class="top-bar">
<div class="brand pulse">🧬 LILJR LIVE</div>
<div class="uptime" id="uptime">--</div>
</div>

<div class="grid">
<div class="card">
<div class="title">Stealth</div>
<div class="value" id="stealth"><span class="status-dot off" id="stealth-dot"></span><span id="stealth-text">OFF</span></div>
<button class="btn" onclick="cmd('stealth')">Toggle</button>
</div>

<div class="card">
<div class="title">VPN Bounce</div>
<div class="value" id="vpn"><span class="status-dot off" id="vpn-dot"></span><span id="vpn-text">OFF</span></div>
<button class="btn blue" onclick="cmd('vpn')">Rotate</button>
</div>

<div class="card">
<div class="title">Mesh Server</div>
<div class="value" id="mesh"><span class="status-dot off" id="mesh-dot"></span><span id="mesh-text">OFF</span></div>
<button class="btn blue" onclick="cmd('mesh')">Start</button>
</div>

<div class="card">
<div class="title">Cash</div>
<div class="value green" id="cash">$--</div>
<button class="btn green" onclick="cmd('portfolio')">View</button>
</div>

<div class="card full">
<div class="title">Positions</div>
<div class="value" id="positions">No positions</div>
</div>

<div class="card">
<div class="title">Photos</div>
<div class="value yellow" id="photos">--</div>
<button class="btn" onclick="cmd('sync_photos')">Sync</button>
</div>

<div class="card">
<div class="title">Storage</div>
<div class="value" id="storage">--</div>
<button class="btn" onclick="cmd('clean_storage')">Clean</button>
</div>

<div class="card full">
<div class="title">Quick Commands</div>
<button class="btn green" onclick="cmd('buy AAPL 5')">Buy AAPL</button>
<button class="btn red" onclick="cmd('sell TSLA')">Sell TSLA</button>
<button class="btn" onclick="cmd('price NVDA')">Price NVDA</button>
<button class="btn blue" onclick="cmd('photo')">📷 Photo</button>
<button class="btn blue" onclick="cmd('screenshot')">📱 Screen</button>
<button class="btn" onclick="cmd('sing')">🎵 Sing</button>
<button class="btn" onclick="cmd('organize')">🗂️ Organize</button>
<button class="btn" onclick="cmd('vault')">🏠 Vault</button>
</div>

<div class="card full">
<div class="title">Live Log</div>
<div class="log" id="log">Waiting for data...</div>
</div>
</div>

<script>
const API = window.location.origin + '/api/live';

async function refresh() {
try{
const r = await fetch(API + '/status', {cache:'no-store'});
const d = await r.json();

// Update status cards
const on = '<span class="status-dot on"></span>ON';
const off = '<span class="status-dot off"></span>OFF';

document.getElementById('stealth').innerHTML = d.stealth ? on : off;
document.getElementById('vpn').innerHTML = d.vpn ? on : off;
document.getElementById('mesh').innerHTML = d.mesh ? on : off;
document.getElementById('cash').textContent = '$' + (d.cash || 0).toLocaleString();
document.getElementById('positions').textContent = d.positions || 'No positions';
document.getElementById('photos').textContent = (d.photos || 0) + ' saved';
document.getElementById('storage').textContent = (d.storage_used || '--') + ' used';
document.getElementById('uptime').textContent = d.uptime || '--';

// Log
const log = document.getElementById('log');
if(d.last_log){
const line = document.createElement('div');
line.textContent = new Date().toLocaleTimeString() + ' ' + d.last_log;
log.insertBefore(line, log.firstChild);
if(log.children.length > 20) log.removeChild(log.lastChild);
}
} catch(e){
document.getElementById('log').textContent = 'Connecting to LilJR...';
}
}

async function cmd(command){
const log = document.getElementById('log');
const line = document.createElement('div');
line.textContent = '> ' + command;
log.insertBefore(line, log.firstChild);
try{
await fetch(API + '/cmd', {
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({cmd:command})
});
} catch(e){}
}

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
